{% extends "base.html" %} {% block title %}Реєстрація{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Registration</h2>
                    
                    <form method="POST">
                        {% csrf_token %}

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">First Name</label>
                                {{ form.first_name }}
                            </div>

                            <div class="col">
                                <label class="form-label">Last Name</label>
                                {{ form.last_name }}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Middle Name</label>
                            {{ form.middle_name }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            {{ form.email }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            {{ form.password }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Role</label>
                            {{ form.role }}
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" data-id="register-button">Sign Up</button>
                        </div>

                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">Already have an account? <a href="{% url 'login' %}">Login here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
