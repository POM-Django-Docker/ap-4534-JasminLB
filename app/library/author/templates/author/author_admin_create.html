{% extends "base.html" %}

{% block title %}Create Author{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Create Author</h2>

    <a href="{% url 'author_admin_list' %}" class="btn btn-outline-secondary btn-sm">
        ← Back
    </a>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body">

        <form method="post" novalidate>
            {% csrf_token %}
            {% include "author/_author_form_fields.html" %}

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    Create
                </button>

                <a href="{% url 'author_admin_list' %}" class="btn btn-light border">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
